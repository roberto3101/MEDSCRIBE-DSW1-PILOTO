services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: medscribe-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:-MedScribe2026!}
      MSSQL_PID: Express
    ports:
      # Expuesto en 1434 para evitar choque con un SQL Server local en 1433.
      # Desde el host (SSMS, etc): conectar a localhost,1434
      # Entre contenedores sigue siendo sqlserver:1433
      - "${SQL_HOST_PORT:-1434}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD:-MedScribe2026!}" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - medscribe

  db-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: medscribe-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      SA_PASSWORD: ${SA_PASSWORD:-MedScribe2026!}
    volumes:
      - ./base-datos/migraciones:/migraciones:ro
      - ./base-datos/storedProcedures:/sp:ro
    command: >
      bash -c '
      echo "Ejecutando migracion principal..." &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "$$SA_PASSWORD" -C -I -b -i /migraciones/MedScribeDB_MigracionCompleta.sql &&
      echo "Migracion completada." &&
      for archivo in /sp/*.sql; do
        if [ -f "$$archivo" ]; then
          echo "Ejecutando $$archivo..." &&
          /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "$$SA_PASSWORD" -C -I -d MedScribeDB -i "$$archivo" || exit 1
        fi
      done &&
      echo "Base de datos lista."
      '
    networks:
      - medscribe
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: medscribe-redis
    command: redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - medscribe
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: medscribe-qdrant
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - medscribe
    restart: unless-stopped

  servicio-ia:
    build: ./servicio-ia
    container_name: medscribe-servicio-ia
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./servicio-ia/documentos-salida:/app/documentos-salida
      - hf_cache:/app/.hf_cache
      - torch_cache:/app/.torch_cache
    networks:
      - medscribe
    restart: unless-stopped

  worker-ia:
    build: ./servicio-ia
    container_name: medscribe-worker-ia
    command: rq worker pipeline_nota_clinica --url redis://redis:6379/0
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      servicio-ia:
        condition: service_started
    volumes:
      - ./servicio-ia/documentos-salida:/app/documentos-salida
      - hf_cache:/app/.hf_cache
      - torch_cache:/app/.torch_cache
    networks:
      - medscribe
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway-dotnet/src/MedScribe.API
    container_name: medscribe-gateway
    ports:
      - "${GATEWAY_PORT:-5000}:5000"
    environment:
      ASPNETCORE_URLS: http://+:5000
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__sql: "Server=sqlserver;Database=MedScribeDB;User Id=sa;Password=${SA_PASSWORD:-MedScribe2026!};TrustServerCertificate=True;"
      Microservicios__ServicioIA: http://servicio-ia:8000
      OrigenesPermitidos__0: http://localhost:3000
      OrigenesPermitidos__1: http://localhost
    depends_on:
      db-init:
        condition: service_completed_successfully
      servicio-ia:
        condition: service_started
    volumes:
      - gateway_documentos:/app/documentos-generados
    networks:
      - medscribe
    restart: unless-stopped

  cliente-web:
    build: ./cliente-web
    container_name: medscribe-cliente-web
    ports:
      - "3000:80"
    depends_on:
      - gateway
    networks:
      - medscribe
    restart: unless-stopped

volumes:
  sqlserver_data:
  gateway_documentos:
  hf_cache:
  torch_cache:
  redis_data:
  qdrant_data:

networks:
  medscribe:
    driver: bridge
